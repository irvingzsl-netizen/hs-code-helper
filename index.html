<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HS编码查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 密码保护层样式 */
        #passwordOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #passwordOverlay.hidden {
            display: none;
        }

        .password-container {
            background: #ffffff;
            padding: 50px 60px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .password-container h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1d1d1f;
            letter-spacing: -0.5px;
        }

        .password-container p {
            font-size: 15px;
            color: #86868b;
            margin-bottom: 30px;
        }

        .password-input-group {
            margin-bottom: 20px;
        }

        #passwordInput {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e5e5e7;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
            text-align: center;
            letter-spacing: 2px;
        }

        #passwordInput:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
        }

        #passwordInput.error {
            border-color: #ff3b30;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .password-error {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .password-error.show {
            opacity: 1;
        }

        #passwordSubmit {
            width: 100%;
            padding: 14px 20px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        #passwordSubmit:hover {
            background: #0056d6;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }

        #passwordSubmit:active {
            transform: translateY(0);
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #ffffff;
            padding: 30px 40px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #007aff;
        }

        .search-section {
            background: #ffffff;
            padding: 25px 40px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        #searchInput {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e5e5e7;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        #searchInput:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #86868b;
        }

        .filters {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
        }

        .filter-tag {
            padding: 8px 16px;
            background: #f5f5f7;
            border: 1px solid #e5e5e7;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .filter-tag:hover {
            background: #e5e5e7;
        }

        .filter-tag.active {
            background: #007aff;
            color: white;
            border-color: #007aff;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .add-btn {
            padding: 8px 16px;
            background: #ffffff;
            border: 1.5px solid #007aff;
            color: #007aff;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            user-select: none;
        }

        .add-btn:hover {
            background: #007aff;
            color: white;
            transform: translateY(-1px);
        }

        .add-btn.secondary {
            border-color: #34c759;
            color: #34c759;
        }

        .add-btn.secondary:hover {
            background: #34c759;
            color: white;
        }

        .table-container {
            background: #ffffff;
            border-radius: 12px;
            overflow: visible;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead {
            background: #f5f5f7;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: #6e6e73;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e5e5e7;
            position: relative;
        }

        .header-text {
            margin-right: 8px;
        }

        .edit-header-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            opacity: 0;
            transition: all 0.2s;
            margin-left: 4px;
        }

        th:hover .edit-header-btn {
            opacity: 0.6;
        }

        .edit-header-btn:hover {
            opacity: 1 !important;
            transform: scale(1.2);
        }

        tbody tr {
            border-bottom: 1px solid #f5f5f7;
            transition: background 0.2s;
            cursor: default;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        td {
            padding: 14px 12px;
            font-size: 14px;
            position: relative;
        }

        td.editable {
            cursor: default;
            position: relative;
            padding-right: 40px;
            user-select: none;
        }

        .cell-value {
            cursor: text;
            user-select: text;
            display: inline-block;
            max-width: 100%;
            vertical-align: top;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            max-height: 42px;
            overflow: hidden;
            position: relative;
            line-height: 1.5;
        }

        .cell-value.is-placeholder {
            color: #b8b8be;
            font-style: normal;
            cursor: default;
            user-select: none;
        }

        td.editable.draft-editable {
            cursor: pointer;
        }

        td.editable.draft-editable:hover {
            background: #fafafa;
        }

        td.editable.draft-editable .cell-value,
        td.editable.draft-editable .cell-value.is-placeholder {
            cursor: pointer;
        }

        .cell-value.is-long::after {
            content: '';
            position: absolute;
            right: 0;
            bottom: 0;
            width: 45%;
            height: 1.5em;
            background: linear-gradient(to right, rgba(255,255,255,0), #ffffff 75%);
            pointer-events: none;
        }

        tbody tr:hover .cell-value.is-long::after {
            background: linear-gradient(to right, rgba(250,250,250,0), #fafafa 75%);
        }

        .edit-cell-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            padding: 3px 5px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s;
        }

        td.editable:hover .edit-cell-btn,
        .edit-cell-btn:focus-visible {
            opacity: 0.6;
            pointer-events: auto;
        }

        .edit-cell-btn:hover {
            opacity: 1 !important;
            transform: translateY(-50%) scale(1.15);
        }

        .category-autocomplete {
            position: relative;
            width: 100%;
            z-index: 40;
        }

        .category-input {
            border-radius: 12px !important;
            padding-right: 12px !important;
            background: #ffffff;
        }

        .category-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            max-height: 230px;
            overflow-y: auto;
            background: #ffffff;
            border: 1px solid #d7d7dc;
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.16);
            padding: 6px;
            z-index: 9999;
        }

        .category-dropdown.show {
            display: block;
        }

        .category-option {
            width: 100%;
            display: block;
            text-align: left;
            padding: 9px 12px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: #1d1d1f;
            font-size: 13px;
            line-height: 1.35;
            cursor: pointer;
            font-family: inherit;
        }

        .category-option:hover,
        .category-option.is-active {
            background: #f0f7ff;
            color: #007aff;
        }

        .category-option.is-empty {
            color: #86868b;
            cursor: default;
        }


        .category-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .category-tag {
            padding: 4px 10px;
            background: #f0f0f0;
            border-radius: 12px;
            font-size: 12px;
            white-space: nowrap;
        }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid #007aff;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
            max-height: 240px;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #86868b;
            font-size: 16px;
        }

        .search-suggestions {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            margin: 20px;
            text-align: left;
        }

        .search-suggestions h3 {
            font-size: 14px;
            color: #1d1d1f;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .suggestion-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggestion-item {
            padding: 6px 12px;
            background: #ffffff;
            border: 1px solid #e5e5e7;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: #007aff;
        }

        .suggestion-item:hover {
            background: #007aff;
            color: white;
            border-color: #007aff;
            transform: translateY(-1px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #86868b;
        }

        @media (max-width: 1200px) {
            .container {
                padding: 15px;
            }
            
            table {
                font-size: 13px;
            }
            
            th, td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <!-- 密码保护层 -->
    <div id="passwordOverlay">
        <div class="password-container">
            <div class="lock-icon">🔐</div>
            <h2>访问验证</h2>
            <p>请输入密码以继续</p>
            <div class="password-input-group">
                <input 
                    type="password" 
                    id="passwordInput" 
                    placeholder="请输入密码"
                    autocomplete="off"
                >
                <div class="password-error" id="passwordError"></div>
            </div>
            <button id="passwordSubmit">确认</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>HS编码查询系统</h1>
            <div id="syncStatus" style="margin-top: 10px; padding: 8px 16px; background: #f0f0f0; border-radius: 8px; display: inline-block; font-size: 13px;">
                <span id="syncIcon">🔄</span>
                <span id="syncText">正在连接...</span>
            </div>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="输入关键词找找看..."
                >
                <span class="search-icon">🔍</span>
            </div>
            
            <div class="filters">
                <div class="filter-group" id="categoryFilters"></div>
                <div class="action-buttons">
                    <button class="add-btn" onclick="addNewItem()">添加条目</button>
                    <button class="add-btn secondary" onclick="addNewColumn()">添加列</button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr id="tableHeader">
                        <th style="width: 80px;">编号</th>
                        <th style="width: 180px;" class="editable-header" data-field="类别">
                            <span class="header-text">类别</span>
                            <button class="edit-header-btn" title="编辑列名">✏️</button>
                        </th>
                        <th style="width: 220px;" class="editable-header" data-field="中英品名">
                            <span class="header-text">中英品名</span>
                            <button class="edit-header-btn" title="编辑列名">✏️</button>
                        </th>
                        <th style="width: 200px;" class="editable-header" data-field="材质/用途判断">
                            <span class="header-text">材质/用途判断</span>
                            <button class="edit-header-btn" title="编辑列名">✏️</button>
                        </th>
                        <th style="width: 100px;" class="editable-header" data-field="HS6">
                            <span class="header-text">HS6</span>
                            <button class="edit-header-btn" title="编辑列名">✏️</button>
                        </th>
                        <th style="width: 120px;" class="editable-header" data-field="10位申报">
                            <span class="header-text">10位申报</span>
                            <button class="edit-header-btn" title="编辑列名">✏️</button>
                        </th>
                        <th style="width: 100px;" class="editable-header" data-field="B3 Duty / MFN">
                            <span class="header-text">税率</span>
                            <button class="edit-header-btn" title="编辑列名">✏️</button>
                        </th>
                        <th style="width: 150px;" class="editable-header" data-field="口径">
                            <span class="header-text">口径</span>
                            <button class="edit-header-btn" title="编辑列名">✏️</button>
                        </th>
                        <th style="width: 50px;">操作</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                    <tr>
                        <td colspan="20" class="loading">数据加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK - 传统方式加载 -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
